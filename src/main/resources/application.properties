spring.application.name=velocity-limits-app

load.limit.daily-amount=5000
load.limit.weekly-amount=20000
load.limit.daily-count=3

input.file=input.txt
output.file=output.txt

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database connection details
spring.datasource.url=jdbc:h2:mem:velocitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

logging.level.ca.bank.velocitylimitsapp=DEBUG